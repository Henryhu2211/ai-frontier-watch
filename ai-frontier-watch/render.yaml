services:
  - type: web
    name: ai-frontier-watch
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        value: https://dummy.supabase.co
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        value: dummy-anon-key
      - key: SUPABASE_SERVICE_KEY
        value: dummy-service-key
      - key: DEEPL_API_KEY
        value: dummy-api-key
      - key: NODE_ENV
        value: production