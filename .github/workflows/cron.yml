name: Data Collection Cron Jobs

on:
  schedule:
    # arXiv collection: Daily at 06:00 UTC
    - cron: '0 6 * * *'
    # News collection: Every 4 hours
    - cron: '0 */4 * * *'
    # Translation retry: Daily at 03:00 UTC
    - cron: '0 3 * * *'
    # Health check: Every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      job_type:
        description: 'Job type to run'
        required: true
        default: 'collect-arxiv'
        type: choice
        options:
          - collect-arxiv
          - collect-news
          - retry-translations
          - health-check
          - all

env:
  NODE_VERSION: '20'
  SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
  SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
  DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}

jobs:
  # ============================================
  # Job 1: arXiv Data Collection
  # ============================================
  collect-arxiv:
    name: Collect arXiv Papers
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.job_type == 'collect-arxiv' || github.event.inputs.job_type == 'all'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Fetch arXiv papers
        run: npm run cron:collect-arxiv
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      
      - name: Store execution result
        run: |
          echo "arXiv collection completed at $(date -u)" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 2: News Collection
  # ============================================
  collect-news:
    name: Collect News Articles
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.job_type == 'collect-news' || github.event.inputs.job_type == 'all'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Fetch VentureBeat AI
        run: npm run cron:collect-venturebeat
        continue-on-error: true
      
      - name: Fetch TechCrunch AI
        run: npm run cron:collect-techcrunch
        continue-on-error: true
      
      - name: Fetch The Verge AI
        run: npm run cron:collect-theverge
        continue-on-error: true
      
      - name: Store execution result
        run: |
          echo "News collection completed at $(date -u)" >> $GITHUB_STEP_SUMMARY

  # ============================================
  # Job 3: Translation Retry
  # ============================================
  retry-translations:
    name: Retry Failed Translations
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.job_type == 'retry-translations' || github.event.inputs.job_type == 'all'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Retry failed translations
        run: npm run cron:retry-translations
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

  # ============================================
  # Job 4: Health Check & Monitoring
  # ============================================
  health-check:
    name: System Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.job_type == 'health-check'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run health check
        run: npm run health:check
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      
      - name: Check data freshness
        run: |
          echo "## Health Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Running" >> $GITHUB_STEP_SUMMARY
      
      - name: Send Slack notification on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 AI Frontier Watch Health Check Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*AI Frontier Watch* - Health Check Failed"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Time:* ${{ github.event.schedule }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

  # ============================================
  # Job 5: Data Backfill (Weekly)
  # ============================================
  data-backfill:
    name: Weekly Data Backfill
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' && github.event.schedule == '0 6 * * 0'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run weekly backfill
        run: npm run cron:backfill-weekly
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
